<!DOCTYPE html>
<html lang="es">
  <head>
    <title>DASW - Carrito de Compras</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.1.1/css/all.css" integrity="sha384-O8whS3fhG2OnA5Kas0Y9l3cfpmYjapjI0E4theH4iuMD+pLhbf6JI0jIMfYcK3yZ" crossorigin="anonymous" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- ========== NAVBAR ========== -->
    <nav class="navbar navbar-expand navbar-dark bg-dark">
      <a class="navbar-brand nav-item nav-link active" href="home.html">DASW</a>

      <div class="flex-grow-1">
        <form class="form-inline">
          <input class="form-control col-sm-9 col-lg-10" type="search" placeholder="Encuentra de todo, empieza a buscar" aria-label="Search" />
          <button class="btn btn-outline-light col-sm-3 col-lg-2" type="submit">Buscar</button>
        </form>
      </div>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item">
            <a class="nav-link" href="admin.html">
              <i class="fas fa-cog"></i> Admin
            </a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-item nav-link dropdown-toggle mr-2" href="#" data-toggle="dropdown">Mi Cuenta</a>
            <div class="dropdown-menu dropdown-menu-right">
              <a class="dropdown-item" href="#">Ingresar</a>
              <a class="dropdown-item" href="#">Registro</a>
              <div class="dropdown-divider"></div>
              <a class="dropdown-item" href="#">Mis pedidos</a>
            </div>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="shopping_cart.html">
              <i class="fas fa-shopping-cart"></i>
              <span class="badge badge-light" id="cartCount">0</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <h2 class="text-center m-3">Resumen de Compra</h2>

    <div class="container mt-4 mb-5">
      <div class="row">
        <!-- Lista de productos del carrito -->
        <div class="col-md-8 col-12" id="cartItemsContainer">
          <!-- Se llena dinamicamente -->
        </div>

        <!-- Resumen de compra -->
        <div class="col-md-4 col-12 mt-md-0 mt-4">
          <div class="cart-summary" id="cartSummary">
            <h5 class="mb-3">Resumen del Pedido</h5>
            <hr />
            <div id="summaryDetails">
              <!-- Se llena dinamicamente -->
            </div>
            <hr />
            <div class="d-flex justify-content-between align-items-center">
              <span class="total-label">Total:</span>
              <span class="total-amount" id="totalAmount">$0.00</span>
            </div>
            <button class="btn btn-success btn-block mt-3" id="btnCheckout">
              <i class="fas fa-credit-card"></i> Proceder al Pago
            </button>
            <a href="home.html" class="btn btn-outline-dark btn-block mt-2">
              <i class="fas fa-arrow-left"></i> Seguir Comprando
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- ========== MODAL: Editar Cantidad ========== -->
    <div class="modal fade" id="editModal" tabindex="-1" role="dialog" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Editar Cantidad</h5>
            <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
          </div>
          <div class="modal-body">
            <div class="text-center mb-3">
              <img src="" id="editModalImg" class="img-fluid" style="max-height: 120px; object-fit: contain;" />
              <h6 class="mt-2" id="editModalTitle"></h6>
            </div>
            <div class="form-group">
              <label for="editModalQty"><strong>Nueva cantidad:</strong></label>
              <input type="number" class="form-control qty-input" id="editModalQty" value="1" min="1" max="99" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" id="btnConfirmEdit">
              <i class="fas fa-check"></i> Confirmar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ========== MODAL: Confirmar Eliminacion ========== -->
    <div class="modal fade" id="deleteModal" tabindex="-1" role="dialog" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header bg-danger text-white">
            <h5 class="modal-title">Confirmar Eliminacion</h5>
            <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
          </div>
          <div class="modal-body">
            <p>Estas seguro de que deseas eliminar <strong id="deleteProductName"></strong> del carrito?</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-danger" id="btnConfirmDelete">
              <i class="fas fa-trash"></i> Eliminar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- jQuery, Popper.js, Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
    <!-- Cart JS -->
    <script src="js/cart.js"></script>
  </body>
</html>
